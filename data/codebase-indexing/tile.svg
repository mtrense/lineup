<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative codebase-indexing tile: a magnifying glass sweeping across a
       grid of code/file cells — search & retrieval over an indexed repository.
       Theme-neutral currentColor at varying opacity; rendered at opacity-10. -->

  <!-- Grid of indexed cells (files / chunks in the index) -->
  <rect x="22" y="22" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="64" y="22" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="106" y="22" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="22" y="64" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="64" y="64" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="106" y="64" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="22" y="106" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="64" y="106" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>
  <rect x="106" y="106" width="34" height="34" rx="5" fill="currentColor" opacity="0.5"/>

  <!-- Magnifying glass: retrieval lens sweeping the index -->
  <circle cx="132" cy="126" r="44" fill="currentColor" opacity="0.18"/>
  <circle cx="132" cy="126" r="44" fill="none" stroke="currentColor" stroke-width="11" opacity="0.85"/>
  <line x1="164" y1="158" x2="188" y2="182" stroke="currentColor" stroke-width="13" stroke-linecap="round" opacity="0.85"/>
</svg>
