<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative hardware/SBC tile: a circuit board with traces and component
       pads suggesting embedded hardware. Theme-neutral currentColor. -->

  <!-- PCB outline -->
  <rect x="25" y="35" width="150" height="130" rx="6" fill="currentColor" opacity="0.25"/>

  <!-- Horizontal traces -->
  <rect x="40" y="65"  width="80" height="5" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="80" y="65"  width="5"  height="30" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="80" y="90"  width="55" height="5" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="40" y="115" width="60" height="5" rx="2" fill="currentColor" opacity="0.55"/>
  <rect x="95" y="115" width="5"  height="25" rx="2" fill="currentColor" opacity="0.55"/>
  <rect x="95" y="135" width="45" height="5" rx="2" fill="currentColor" opacity="0.55"/>
  <rect x="130" y="90" width="5"  height="50" rx="2" fill="currentColor" opacity="0.5"/>

  <!-- Component pads / vias -->
  <circle cx="40"  cy="67"  r="7"  fill="currentColor" opacity="0.7"/>
  <circle cx="135" cy="67"  r="7"  fill="currentColor" opacity="0.7"/>
  <circle cx="40"  cy="117" r="7"  fill="currentColor" opacity="0.65"/>
  <circle cx="135" cy="117" r="7"  fill="currentColor" opacity="0.65"/>

  <!-- IC chip block (centre) -->
  <rect x="68" y="78" width="44" height="44" rx="4" fill="currentColor" opacity="0.6"/>
  <!-- Chip legs left -->
  <rect x="52" y="85"  width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
  <rect x="52" y="96"  width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
  <rect x="52" y="107" width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
  <!-- Chip legs right -->
  <rect x="132" y="85"  width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
  <rect x="132" y="96"  width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
  <rect x="132" y="107" width="16" height="5" rx="2" fill="currentColor" opacity="0.7"/>
</svg>
