<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative AI/neural-network tile: nodes connected by edges suggesting
       a small neural net. Theme-neutral currentColor. -->

  <!-- Edges (lines between nodes) -->
  <!-- Layer 1→2 connections -->
  <line x1="50" y1="60"  x2="100" y2="80"  stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="60"  x2="100" y2="120" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="100" x2="100" y2="80"  stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="100" x2="100" y2="120" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="140" x2="100" y2="80"  stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="50" y1="140" x2="100" y2="120" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <!-- Layer 2→3 connections -->
  <line x1="100" y1="80"  x2="150" y2="70"  stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="80"  x2="150" y2="100" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="80"  x2="150" y2="130" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="120" x2="150" y2="70"  stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="120" x2="150" y2="100" stroke="currentColor" stroke-width="3" opacity="0.3"/>
  <line x1="100" y1="120" x2="150" y2="130" stroke="currentColor" stroke-width="3" opacity="0.3"/>

  <!-- Input layer nodes -->
  <circle cx="50" cy="60"  r="12" fill="currentColor" opacity="0.7"/>
  <circle cx="50" cy="100" r="12" fill="currentColor" opacity="0.7"/>
  <circle cx="50" cy="140" r="12" fill="currentColor" opacity="0.7"/>
  <!-- Hidden layer nodes -->
  <circle cx="100" cy="80"  r="14" fill="currentColor" opacity="0.65"/>
  <circle cx="100" cy="120" r="14" fill="currentColor" opacity="0.65"/>
  <!-- Output layer nodes -->
  <circle cx="150" cy="70"  r="12" fill="currentColor" opacity="0.7"/>
  <circle cx="150" cy="100" r="12" fill="currentColor" opacity="0.7"/>
  <circle cx="150" cy="130" r="12" fill="currentColor" opacity="0.7"/>
</svg>
