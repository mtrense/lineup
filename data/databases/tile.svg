<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative database tile: stacked cylinders suggesting relational data.
       Theme-neutral: uses currentColor at low opacity so it works on any
       background colour in both light and dark mode.
       TileBackground renders this at opacity-10, so fills are intentionally solid. -->

  <!-- Bottom cylinder body -->
  <rect x="30" y="120" width="140" height="40" rx="4" fill="currentColor" opacity="0.6"/>
  <ellipse cx="100" cy="120" rx="70" ry="16" fill="currentColor" opacity="0.8"/>
  <ellipse cx="100" cy="160" rx="70" ry="16" fill="currentColor" opacity="0.4"/>

  <!-- Middle cylinder body -->
  <rect x="40" y="76" width="120" height="36" rx="4" fill="currentColor" opacity="0.55"/>
  <ellipse cx="100" cy="76" rx="60" ry="13" fill="currentColor" opacity="0.75"/>
  <ellipse cx="100" cy="112" rx="60" ry="13" fill="currentColor" opacity="0.35"/>

  <!-- Top cylinder body -->
  <rect x="52" y="40" width="96" height="32" rx="4" fill="currentColor" opacity="0.5"/>
  <ellipse cx="100" cy="40" rx="48" ry="11" fill="currentColor" opacity="0.7"/>
  <ellipse cx="100" cy="72" rx="48" ry="11" fill="currentColor" opacity="0.3"/>
</svg>
