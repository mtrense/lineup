<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative Rust/systems tile: two interlocking gears suggesting
       low-level, performant system design. Theme-neutral currentColor. -->

  <!-- Large gear (left) -->
  <circle cx="80" cy="105" r="36" fill="currentColor" opacity="0.5"/>
  <circle cx="80" cy="105" r="20" fill="currentColor" opacity="0.0"/>
  <!-- Gear teeth (large) -->
  <rect x="68"  y="62"  width="24" height="14" rx="3" fill="currentColor" opacity="0.6"/>
  <rect x="68"  y="133" width="24" height="14" rx="3" fill="currentColor" opacity="0.6"/>
  <rect x="37"  y="93"  width="14" height="24" rx="3" fill="currentColor" opacity="0.6"/>
  <rect x="109" y="93"  width="14" height="24" rx="3" fill="currentColor" opacity="0.6"/>
  <rect x="47"  y="70"  width="14" height="18" rx="3" fill="currentColor" opacity="0.55" transform="rotate(-45 54 79)"/>
  <rect x="47"  y="118" width="14" height="18" rx="3" fill="currentColor" opacity="0.55" transform="rotate(45 54 127)"/>
  <rect x="97"  y="70"  width="14" height="18" rx="3" fill="currentColor" opacity="0.55" transform="rotate(45 104 79)"/>
  <rect x="97"  y="118" width="14" height="18" rx="3" fill="currentColor" opacity="0.55" transform="rotate(-45 104 127)"/>
  <!-- Hub hole -->
  <circle cx="80" cy="105" r="12" fill="currentColor" opacity="0.0"/>
  <circle cx="80" cy="105" r="8" fill="currentColor" opacity="0.3"/>

  <!-- Small gear (right) -->
  <circle cx="138" cy="76" r="24" fill="currentColor" opacity="0.5"/>
  <!-- Gear teeth (small) -->
  <rect x="129" y="46"  width="18" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="129" y="100" width="18" height="10" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="108" y="67"  width="10" height="18" rx="2" fill="currentColor" opacity="0.6"/>
  <rect x="158" y="67"  width="10" height="18" rx="2" fill="currentColor" opacity="0.6"/>
  <!-- Hub hole -->
  <circle cx="138" cy="76" r="7" fill="currentColor" opacity="0.3"/>
</svg>
