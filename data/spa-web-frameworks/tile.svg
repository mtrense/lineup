<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative web/browser tile: a browser chrome frame with a code-block grid
       suggesting frontend frameworks. Theme-neutral currentColor fills. -->

  <!-- Browser window frame -->
  <rect x="20" y="30" width="160" height="120" rx="8" fill="currentColor" opacity="0.5"/>
  <!-- Title bar -->
  <rect x="20" y="30" width="160" height="24" rx="8" fill="currentColor" opacity="0.3"/>
  <rect x="20" y="42" width="160" height="12" fill="currentColor" opacity="0.3"/>
  <!-- Traffic-light buttons -->
  <circle cx="38" cy="42" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="54" cy="42" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="70" cy="42" r="5" fill="currentColor" opacity="0.7"/>

  <!-- Content area: horizontal code lines of varying lengths -->
  <rect x="34" y="68" width="60" height="7" rx="3" fill="currentColor" opacity="0.6"/>
  <rect x="34" y="82" width="100" height="7" rx="3" fill="currentColor" opacity="0.5"/>
  <rect x="42" y="96" width="80" height="7" rx="3" fill="currentColor" opacity="0.45"/>
  <rect x="42" y="110" width="50" height="7" rx="3" fill="currentColor" opacity="0.4"/>
  <rect x="34" y="124" width="90" height="7" rx="3" fill="currentColor" opacity="0.5"/>

  <!-- Right panel block (component sidebar suggestion) -->
  <rect x="144" y="60" width="24" height="84" rx="4" fill="currentColor" opacity="0.3"/>
</svg>
